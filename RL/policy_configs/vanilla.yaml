name: 'PPO'
env:
  device: 'cuda'
  env_temp: 1.0
  straight_through_min: False
  model_seed: 100
  test_seed: 42
  train_seed: 3003
  randomize: True 
  time_f: False 
  reward_scale: 1.0
#  batch: 3
model: 
  policy_name: "vanilla"
  scale: 10
training:   
  behavior_cloning: False
  normalize_advantage: True
  normalize_value: True
  normalize_reward: True
  rescale_v: True
  truncation: True
  amp_value: False
  var_scaler: 1.0
  per_iter_normal_obs: False
  per_iter_normal_value: False
  actors: 5
  episode_steps: 1000
  num_epochs: 10
  train_batch: 4
  test_batch: 4
  lr: 0.0003 
  lr_policy: 0.0009
  lr_value: 0.0003
  min_lr_policy: 0.00001 
  min_lr_value: 0.00001 
  gae_lambda: 0.99 
  gamma: 0.998 
  target_kl: 0.03
  vf_coef: 1.0
  batch_size: 100
  ppo_epochs: 3
  clip_range_vf: null 
  ent_coef: 0.01
policy: 
  test_policy: 'vanilla' 
plot: 
  plot_policy_curve: True 
  inds: [0,1] 
  val_inds: [0, 0] 
checkpoint: null

#gamma: 0.99
#gae_lambda: 0.95
#clip_epsilon: 0.2
#ent_coef: 0.0
#vf_coef: 0.5
#lr: 0.0003                 # Adam 学习率（actor/critic 共用）
#ppo_epochs: 10             # 每个 batch 上的 PPO 轮数
#minibatch_size: 64
#frames_per_batch: 16     # 每次从采样器收集的步数（会被 SyncDataCollector 使用）
#total_frames: 200000       # 训练总步数（collector 的 total_frames）
#log_every: 10              # 训练日志打印频率（可选）
#hidden_sizes: [128, 128]   # MLP 隐藏层
#activation: tanh           # 仅注释说明：你的构建器里用 nn.Tanh
#in_key: obs                # 你的 trainer 目前从 "obs" 读输入